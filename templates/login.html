{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="dashboard-card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle fs-1 text-primary"></i>
                    <h3 class="mt-2">Вход в систему</h3>
                    <p class="text-muted">Добро пожаловать обратно!</p>
                </div>

                {% if message %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Логин или Email</label>
                        <input type="text" name="login" class="form-control" placeholder="Введите логин или email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Войти</button>
                </form>

                <hr>
                <p class="text-center mb-0">
                    Нет аккаунта? <a href="/register" class="text-decoration-none">Зарегистрироваться</a>
                </p>
                <p class="text-center text-muted small mt-3">Тестовый вход: admin / admin123</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
