{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="dashboard-card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus fs-1 text-success"></i>
                    <h3 class="mt-2">Регистрация</h3>
                    <p class="text-muted">Создайте аккаунт и бронируйте номера</p>
                </div>

                {% if message %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endif %}

                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Логин</label>
                            <input type="text" name="username" class="form-control" placeholder="Придумайте логин" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Имя</label>
                            <input type="text" name="first_name" class="form-control" placeholder="Иван">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Фамилия</label>
                            <input type="text" name="last_name" class="form-control" placeholder="Иванов">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="text" name="phone" class="form-control" placeholder="+7 (999) 123-45-67">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="Придумайте пароль" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Повторите пароль</label>
                        <input type="password" name="password2" class="form-control" placeholder="Повторите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">Зарегистрироваться</button>
                </form>

                <hr>
                <p class="text-center mb-0">
                    Уже есть аккаунт? <a href="/login" class="text-decoration-none">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
